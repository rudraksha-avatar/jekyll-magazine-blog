# ============================================================
# Site Settings
# ============================================================
title: "The Pulse"
tagline: "Ideas, Insights & Stories"
description: "A modern magazine and blog covering technology, culture, lifestyle, and ideas that matter."
url: "https://thepulse.example.com"
baseurl: ""
lang: "en"
timezone: "UTC"

# ============================================================
# Author / Organization
# ============================================================
author:
  name: "The Pulse Editorial"
  email: "hello@thepulse.example.com"

organization:
  name: "The Pulse"
  logo: "https://placehold.co/200x60/1a1a2e/ffffff?text=The+Pulse"

# ============================================================
# Social
# ============================================================
social:
  twitter: "thepulse"
  facebook: "thepulse"
  instagram: "thepulse"
  linkedin: "thepulse"
  youtube: ""
  rss: "/feed.xml"

# ============================================================
# Build Settings
# ============================================================
markdown: kramdown
highlighter: rouge
permalink: /blog/:categories/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: true

# ============================================================
# Plugins
# ============================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate-v2
  - jekyll-archives
  - jekyll-include-cache
  - jekyll-last-modified-at
  - jekyll-redirect-from
  - jekyll-toc

# ============================================================
# Pagination (jekyll-paginate-v2)
# ============================================================
pagination:
  enabled: true
  per_page: 9
  permalink: "/page/:num/"
  title: ":title - Page :num"
  limit: 0
  sort_field: "date"
  sort_reverse: true

autopages:
  enabled: true
  categories:
    enabled: true
    layouts:
      - "category.html"
    title: "Category: :cat"
    permalink: "/category/:cat/"
    slugify:
      mode: "default"
      cased: false
  tags:
    enabled: true
    layouts:
      - "tag.html"
    title: "Tag: :tag"
    permalink: "/tag/:tag/"
    slugify:
      mode: "default"
      cased: false
  collections:
    enabled: false

# ============================================================
# Jekyll Archives
# Disabled — jekyll-paginate-v2 autopages handles category/tag
# archives at /category/:name/ and /tag/:name/ instead.
# ============================================================
jekyll-archives:
  enabled: []

# ============================================================
# SEO Tag
# ============================================================
twitter:
  username: thepulse
  card: summary_large_image

facebook:
  app_id: ""
  publisher: ""

logo: "https://placehold.co/200x60/1a1a2e/ffffff?text=The+Pulse"

# ============================================================
# Feed
# ============================================================
feed:
  path: feed.xml
  posts_limit: 20

# Follow.it subscription
# Replace the action URL in newsletter.html / sidebar.html / subscribe_inline.html
# with your Follow.it form action once you've registered your feed at:
# https://follow.it/add-feed
followit:
  feed_url: "/feed.xml"

# ============================================================
# Sass
# ============================================================
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

# ============================================================
# Exclude from build
# ============================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .git
  - README.md
  - "*.sh"
  - "*.log"

# ============================================================
# Include
# ============================================================
include:
  - _pages
  - robots.txt
  - ads.txt
  - .htaccess

# ============================================================
# Front Matter Defaults
# ============================================================
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "editorial"
      image: "https://placehold.co/1200x675/e5e7eb/6b7280?text=The+Pulse"
      image_alt: "Article featured image"
      featured: false
      toc: false
      comments: false
      share: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      show_breadcrumbs: true
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"
      show_breadcrumbs: true

# ============================================================
# Collections
# Note: _pages is handled via the include: directive above,
# not as a collection, to avoid duplicate output conflicts.
# ============================================================

# ============================================================
# Reading Time (words per minute)
# ============================================================
reading_speed: 200

# ============================================================
# Categories with descriptions (used in templates)
# ============================================================
category_descriptions:
  technology: "The latest in tech, software, AI, and digital innovation."
  culture: "Art, society, media, and the ideas shaping our world."
  lifestyle: "Health, travel, food, and living well."
  business: "Entrepreneurship, finance, and the future of work."
  science: "Discoveries, research, and the wonders of the natural world."

# ============================================================
# Featured categories shown on homepage
# ============================================================
featured_categories:
  - technology
  - culture
  - lifestyle
  - business
