<section class="newsletter-section" aria-label="Newsletter signup">
  <div class="container">
    <div class="newsletter-inner">
      <div class="newsletter-text">
        <h2 class="newsletter-title">Stay in the loop</h2>
        <p class="newsletter-subtitle">Get the best stories delivered to your inbox. No spam, ever.</p>
      </div>
      <form class="newsletter-form" action="#" method="post" aria-label="Newsletter subscription form">
        <div class="newsletter-form-group">
          <label for="newsletter-email" class="sr-only">Email address</label>
          <input
            type="email"
            id="newsletter-email"
            name="email"
            placeholder="Your email address"
            required
            class="newsletter-input"
            autocomplete="email"
          >
          <button type="submit" class="newsletter-btn">Subscribe</button>
        </div>
        <p class="newsletter-note">By subscribing you agree to our <a href="{{ '/privacy-policy/' | relative_url }}">Privacy Policy</a>.</p>
      </form>
    </div>
  </div>
</section>
