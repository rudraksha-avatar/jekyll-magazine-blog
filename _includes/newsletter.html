<section class="newsletter-section" aria-labelledby="newsletter-heading">
  <div class="container">
    <div class="newsletter-inner">

      <div class="newsletter-text">
        <h2 class="newsletter-title" id="newsletter-heading">Stay in the loop</h2>
        <p class="newsletter-subtitle">Get the best stories delivered to your inbox. No spam, ever.</p>
        <a href="{{ site.social.rss | default: '/feed.xml' | relative_url }}" class="newsletter-rss-link" aria-label="Subscribe via RSS feed">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
          Subscribe via RSS
        </a>
      </div>

      <!-- Follow.it subscription form
           Feed URL: {{ site.url }}/feed.xml
           Docs: https://follow.it/how-to-add-follow-it-to-your-website
           Replace the action URL with your real Follow.it form action. -->
      <form
        class="newsletter-form"
        action="https://api.follow.it/subscription-form/dGhlcHVsc2UuZXhhbXBsZS5jb20vZmVlZC54bWw=/8"
        method="post"
        aria-label="Email subscription form"
        target="_blank"
        rel="noopener"
      >
        <div class="newsletter-form-group">
          <label for="newsletter-email" class="sr-only">Your email address</label>
          <input
            type="email"
            id="newsletter-email"
            name="email"
            placeholder="Your email address"
            required
            class="newsletter-input"
            autocomplete="email"
            aria-required="true"
          >
          <button type="submit" class="newsletter-btn">
            Subscribe
          </button>
        </div>
        <p class="newsletter-note">
          Powered by <a href="https://follow.it" target="_blank" rel="noopener noreferrer">Follow.it</a>
          &nbsp;&middot;&nbsp;
          By subscribing you agree to our <a href="{{ '/privacy-policy/' | relative_url }}">Privacy Policy</a>.
        </p>
      </form>

    </div>
  </div>
</section>
