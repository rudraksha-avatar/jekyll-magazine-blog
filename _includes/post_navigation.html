{% if page.previous or page.next %}
<nav class="post-nav" aria-label="Post navigation">
  <div class="post-nav-inner">
    {% if page.next %}
    <div class="post-nav-item post-nav-prev">
      <span class="post-nav-label">&larr; Previous</span>
      <a href="{{ page.next.url | relative_url }}" class="post-nav-link">{{ page.next.title }}</a>
    </div>
    {% endif %}
    {% if page.previous %}
    <div class="post-nav-item post-nav-next">
      <span class="post-nav-label">Next &rarr;</span>
      <a href="{{ page.previous.url | relative_url }}" class="post-nav-link">{{ page.previous.title }}</a>
    </div>
    {% endif %}
  </div>
</nav>
{% endif %}
