---
layout: default
title: "Search"
description: "Search articles on The Pulse."
permalink: /search/
---

<div class="container">
  <div class="search-page">

    <header class="search-header">
      <h1 class="search-title">Search</h1>
    </header>

    <div class="search-form-wrap">
      <form class="search-form" role="search" aria-label="Site search">
        <label for="search-input" class="sr-only">Search articles</label>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search articles, topics, authors..."
          autocomplete="off"
          spellcheck="false"
          aria-label="Search articles"
        >
        <button type="submit" class="search-btn" aria-label="Submit search">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search
        </button>
      </form>
    </div>

    <p class="search-results-info" id="search-info" aria-live="polite"></p>

    <div id="search-results" aria-live="polite" aria-label="Search results"></div>

    <noscript>
      <p class="text-muted">Search requires JavaScript to be enabled.</p>
    </noscript>

  </div>
</div>
<div class="footer-spacer" aria-hidden="true"></div>
