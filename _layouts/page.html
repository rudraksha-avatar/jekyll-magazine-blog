---
layout: default
---

<div class="container">
  <div class="post-layout">
    <div class="post-main">
      <article class="page-content">
        <header class="page-header">
          <h1 class="page-title">{{ page.title }}</h1>
          {% if page.description %}
          <p class="page-subtitle">{{ page.description }}</p>
          {% endif %}
        </header>
        <div class="page-body">
          {{ content }}
        </div>
      </article>
    </div>
    <aside class="post-sidebar" role="complementary" aria-label="Sidebar">
      {% include sidebar.html %}
    </aside>
  </div>
</div>

{% if site.data.settings.show_newsletter %}
{% include newsletter.html %}
{% else %}
<div class="footer-spacer" aria-hidden="true"></div>
{% endif %}
